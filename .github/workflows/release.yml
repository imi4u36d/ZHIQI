name: Release APK

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: "Tag version (example: 1.0)"
        required: true
        default: "1.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Create and push tag
      if: ${{ github.event_name == 'workflow_dispatch' }}
      env:
        TAG_NAME: ${{ env.RELEASE_TAG }}
      run: |
        if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
          echo "Tag already exists: $TAG_NAME"
          exit 1
        fi
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
        git push origin "$TAG_NAME"

    - name: Build Debug APK
      run: |
        chmod +x gradlew
        ./gradlew --no-daemon assembleDebug

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        name: 知期 ${{ env.RELEASE_TAG }}
        generate_release_notes: true
        files: app/build/outputs/apk/debug/知期.apk
